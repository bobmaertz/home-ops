---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  destination:
    namespace: prometheus
    server: https://kubernetes.default.svc
  project: default
  sources:
    - chart: prometheus
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 27.8.0
      helm:
        values: |
          alertmanager:
            enabled: true
            image:
              tag: v0.28.0
            extraVolumes:
              - name: discord-webhook
                secret:
                  secretName: alertmanager-discord-secret
            extraVolumeMounts:
              - name: discord-webhook
                mountPath: /etc/alertmanager/secrets
                readOnly: true
          alertmanagerFiles:
            alertmanager.yml:
              global:
                resolve_timeout: 5m
              route:
                group_by: [alertname, namespace]
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 12h
                receiver: discord
              receivers:
                - name: discord
                  discord_configs:
                    - webhook_url_file: /etc/alertmanager/secrets/discord-webhook-url
                      title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
          nodeExporter:
            enabled: false
          server:
            retention: "90d"
            retentionSize: "28GB"
            persistentVolume:
              enabled: true
              storageClass: "longhorn"
              size: 32Gi
              accessModes:
                - ReadWriteOnce
          serverFiles:
            alerting_rules.yml:
              groups:
                - name: certificate-expiry
                  rules:
                    - alert: CertificateExpiringSoon
                      expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 24 * 3600
                      for: 1h
                      labels:
                        severity: warning
                      annotations:
                        summary: "Certificate {{ $labels.name }} expires soon"
                        description: "Certificate {{ $labels.name }} in {{ $labels.exported_namespace }} expires in {{ $value | humanizeDuration }}."
                    - alert: CertificateExpiryCritical
                      expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
                      for: 1h
                      labels:
                        severity: critical
                      annotations:
                        summary: "Certificate {{ $labels.name }} expiry critical"
                        description: "Certificate {{ $labels.name }} in {{ $labels.exported_namespace }} expires in {{ $value | humanizeDuration }}."
                - name: disk-usage
                  rules:
                    - alert: DiskUsageWarning
                      expr: 100 - (node_filesystem_avail_bytes{fstype!~"tmpfs|rootfs|overlay"} * 100 / node_filesystem_size_bytes{fstype!~"tmpfs|rootfs|overlay"}) > 80
                      for: 5m
                      labels:
                        severity: warning
                      annotations:
                        summary: "Disk usage above 80% on {{ $labels.instance }}"
                        description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | humanize }}% used."
                    - alert: DiskUsageCritical
                      expr: 100 - (node_filesystem_avail_bytes{fstype!~"tmpfs|rootfs|overlay"} * 100 / node_filesystem_size_bytes{fstype!~"tmpfs|rootfs|overlay"}) > 90
                      for: 5m
                      labels:
                        severity: critical
                      annotations:
                        summary: "Disk usage above 90% on {{ $labels.instance }}"
                        description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | humanize }}% used."
          extraScrapeConfigs: |
            - job_name: 'Proxmox-Curiosity'
              metrics_path: /pve
              params:
                module: [default]
              static_configs:
                - targets: ['curiosity.bou1der.net:9221']
            - job_name: 'node_exporter'
              static_configs:
                - targets: ['docker.bou1der.net:9100']
            - job_name: 'Sojourner'
              static_configs:
                - targets: ['ml01.bou1der.net:9835', 'ml01.bou1der.net:9100']
              metrics_path: /metrics
              params:
                module: [default]
            - job_name: 'cert-manager'
              static_configs:
                - targets: ['cert-manager.cert-manager.svc.cluster.local:9402']
    - repoURL: 'https://github.com/bobmaertz/home-ops.git'
      targetRevision: HEAD
      path: kubernetes/orion/manifests/monitoring/prometheus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
