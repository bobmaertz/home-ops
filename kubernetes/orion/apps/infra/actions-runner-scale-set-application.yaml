---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actions-runner-scale-set
  namespace: argocd
spec:
  destination:
    namespace: actions-runner
    server: https://kubernetes.default.svc
  project: default
  sources:
  - repoURL: 'ghcr.io/actions/actions-runner-controller-charts'
    chart: gha-runner-scale-set
    targetRevision: 0.9.3
    helm:
      releaseName: orion-runner-set
      values: |
        githubConfigUrl: "https://github.com/bobmaertz"
        githubConfigSecret: arc-github-pat
        minRunners: 0
        maxRunners: 2
        runnerScaleSetName: "self-hosted-orion"
        containerMode:
          type: dind
        template:
          spec:
            # Prevent workflows from querying the K8s API or reading other secrets.
            automountServiceAccountToken: false
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                securityContext:
                  allowPrivilegeEscalation: false
                  runAsNonRoot: true
                  runAsUser: 1001
                resources:
                  requests:
                    cpu: "500m"
                    memory: "1Gi"
                  limits:
                    cpu: "2"
                    memory: "4Gi"
              # DinD sidecar: privileged is required for Docker builds.
              # Limits prevent a runaway build from exhausting node resources.
              - name: dind
                image: docker:dind
                securityContext:
                  privileged: true
                resources:
                  requests:
                    cpu: "500m"
                    memory: "1Gi"
                  limits:
                    cpu: "4"
                    memory: "8Gi"
                env:
                  - name: DOCKER_TLS_CERTDIR
                    value: ""
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
