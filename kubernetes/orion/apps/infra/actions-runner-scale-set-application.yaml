---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actions-runner-scale-set
  namespace: argocd
spec:
  destination:
    namespace: actions-runner
    server: https://kubernetes.default.svc
  project: default
  sources:
  - repoURL: 'ghcr.io/actions/actions-runner-controller-charts'
    chart: gha-runner-scale-set
    targetRevision: 0.9.3
    helm:
      releaseName: orion-runner-set
      values: |
        githubConfigUrl: "https://github.com/bobmaertz"
        githubConfigSecret: arc-github-pat
        minRunners: 0
        maxRunners: 2
        runnerScaleSetName: "self-hosted-orion"
        template:
          spec:
            # No K8s API access from within workflow jobs.
            automountServiceAccountToken: false
            # Pull the custom runner image from the private registry.
            imagePullSecrets:
              - name: registry-pull-secret
            containers:
              - name: runner
                image: registry.bou1der.net/infra/actions-runner:latest
                command: ["/home/runner/run.sh"]
                # Kaniko requires uid 0 to unpack filesystem layers.
                # allowPrivilegeEscalation: false prevents any suid/sgid escalation.
                # privileged: true is NOT set — this is root-in-container only.
                securityContext:
                  allowPrivilegeEscalation: false
                  runAsNonRoot: false
                  runAsUser: 0
                resources:
                  requests:
                    cpu: "500m"
                    memory: "1Gi"
                  limits:
                    cpu: "4"
                    memory: "8Gi"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
