apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: heimdall-app
  namespace: argocd
spec:
  destination:
    namespace: heimdall
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    repoURL: 'https://github.com/bobmaertz/home-ops.git'
    targetRevision: HEAD
    path: kubernetes/orion/manifests/default/heimdall/
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
