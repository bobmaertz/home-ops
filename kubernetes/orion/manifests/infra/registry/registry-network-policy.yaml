---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: registry-ingress
  namespace: registry
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from Istio ingress gateway (external clients via registry.bou1der.net)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-ingress
    # Allow traffic from the runner namespace (image builds/pushes)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: actions-runner
    # Allow Istio sidecar health probes from within the registry namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: registry
