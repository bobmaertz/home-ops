---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: registry-pv-nfs-data
spec:
  storageClassName: ""
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    path: /volume1/kubedata/registry/data
    server: nas.bou1der.net
    readOnly: false
  claimRef:
    name: registry-data
    namespace: registry
