---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitea-pv-nfs-data
spec:
  storageClassName: ""
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    path: /volume1/kubedata/gitea/data
    server: nas.bou1der.net
    readOnly: false
  claimRef:
    name: gitea-data
    namespace: gitea
