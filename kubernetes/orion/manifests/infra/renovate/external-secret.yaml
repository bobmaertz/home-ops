---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: renovate-token
  namespace: renovate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-secret-store
  target:
    name: renovate-token
  data:
    - secretKey: token
      remoteRef:
        key: "renovate_github_token"
        property: credential
