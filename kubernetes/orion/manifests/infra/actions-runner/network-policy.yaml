---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: runner-isolation
  namespace: actions-runner
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ARC controller and listener pods communicate within the namespace only.
    # Nothing outside the namespace should initiate connections to runner pods.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: actions-runner
  egress:
    # DNS — required for all name resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Registry namespace — direct in-cluster access for image push/pull
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: registry
    # Internet egress — required for:
    #   GitHub (code checkout, ARC long-poll)
    #   ghcr.io / Docker Hub (runner and base image pulls)
    #   registry.bou1der.net via MetalLB (external hostname for registry)
    #   Package registries (npm, pip, go modules, etc.)
    # This allows all non-cluster-pod internet traffic.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # Block direct pod-to-pod access to cluster pod CIDR ranges.
              # Adjust if your cluster uses a different pod CIDR.
              - 10.244.0.0/16
