---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-secret-store
  target:
    name: argocd-notifications-secret
  data:
    - secretKey: discord-webhook-url
      remoteRef:
        key: "Discord - Orion Deployment Webhook"
        property: credential
