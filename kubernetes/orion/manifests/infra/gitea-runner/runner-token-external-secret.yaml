---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitea-runner-token
  namespace: gitea-runner
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-secret-store
  target:
    name: gitea-runner-token
  data:
    - secretKey: token
      remoteRef:
        key: "gitea_runner_token"
        property: credential
