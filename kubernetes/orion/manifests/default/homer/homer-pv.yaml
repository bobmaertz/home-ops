apiVersion: v1
kind: PersistentVolume
metadata:
  name: homer-pv-nfs-assets
  namespace: homer
spec:
  storageClassName: ""
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    path: /volume1/kubedata/homer/assets
    server: nas.bou1der.net
    readOnly: false
