apiVersion: v1
kind: PersistentVolume
metadata:
  name: heimdall-pv-nfs-config
  namespace: heimdall
spec:
  storageClassName: ""
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    path: /volume1/kubedata/heimdall/config
    server: nas.bou1der.net
    readOnly: false
