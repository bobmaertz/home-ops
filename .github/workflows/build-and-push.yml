name: Build and Push to Private Registry

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "Image name, e.g. myapp/api"
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      context:
        required: false
        type: string
        default: "."
      scan:
        required: false
        type: boolean
        default: false
        description: "Run Trivy security scan after push"
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  build-and-push:
    runs-on: self-hosted-orion
    steps:
      - uses: actions/checkout@v4

      # Write credentials to the path Kaniko reads at build time.
      # The file is ephemeral — it lives only for this runner pod's lifetime.
      - name: Write registry credentials
        env:
          REGISTRY: registry.bou1der.net
          USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          mkdir -p /kaniko/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${REGISTRY}" \
            "$(printf '%s:%s' "${USERNAME}" "${PASSWORD}" | base64 -w 0)" \
            > /kaniko/.docker/config.json

      # Kaniko builds and pushes in a single step — no local image load needed.
      # --cache / --cache-repo uses the registry itself as a layer cache.
      - name: Build and push with Kaniko
        run: |
          /kaniko/executor \
            --context=dir://${{ github.workspace }}/${{ inputs.context }} \
            --dockerfile=${{ github.workspace }}/${{ inputs.dockerfile }} \
            --destination=registry.bou1der.net/${{ inputs.image_name }}:${{ github.sha }} \
            --destination=registry.bou1der.net/${{ inputs.image_name }}:latest \
            --cache=true \
            --cache-repo=registry.bou1der.net/${{ inputs.image_name }}:buildcache \
            --push-retry=3

      # Trivy scans post-push since Kaniko pushes directly (no local image).
      # Credentials allow Trivy to pull from the private registry to scan.
      - name: Trivy scan
        if: ${{ inputs.scan }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry.bou1der.net/${{ inputs.image_name }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
