name: Build and Push to Private Registry

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "Image name, e.g. myapp/api"
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      context:
        required: false
        type: string
        default: "."
      scan:
        required: false
        type: boolean
        default: false
        description: "Run Trivy security scan before push"
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  build-and-push:
    runs-on: self-hosted-orion
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: registry.bou1der.net
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: |
            registry.bou1der.net/${{ inputs.image_name }}:${{ github.sha }}
            registry.bou1der.net/${{ inputs.image_name }}:latest
          cache-from: type=registry,ref=registry.bou1der.net/${{ inputs.image_name }}:buildcache
          cache-to: type=registry,ref=registry.bou1der.net/${{ inputs.image_name }}:buildcache,mode=max

      - name: Trivy security scan
        if: ${{ inputs.scan }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry.bou1der.net/${{ inputs.image_name }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push image
        run: |
          docker push registry.bou1der.net/${{ inputs.image_name }}:${{ github.sha }}
          docker push registry.bou1der.net/${{ inputs.image_name }}:latest
